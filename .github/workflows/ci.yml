name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Run pytest
        run: uv run pytest tests/ -v --tb=short

      - name: Run smoke reproduction
        run: uv run python scripts/reproduce_paper_results.py

      - name: Check no placeholders in generated tables
        run: uv run python scripts/check_no_placeholders.py

      - name: Upload outputs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lexon-bench-outputs-py${{ matrix.python-version }}
          path: |
            outputs/tables/
            outputs/results/
            outputs/reports/
          retention-days: 30
