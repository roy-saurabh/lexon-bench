  - id: RC-EU-AIA-001
    instrument: EU AI Act
    paraphrased_obligation: >
      Providers of high-risk AI systems must maintain technical documentation.
    note: Paraphrase only. Consult official text (Regulation (EU) 2024/1689).
  - id: RC-NIST-001
    instrument: NIST AI RMF
    paraphrased_obligation: >
      Organisations should govern AI risk through documented policies.
    note: Paraphrase only. Consult NIST AI 100-1.
  - id: RC-ISO-001
    instrument: ISO/IEC 42001
    paraphrased_obligation: >
      Organisations shall establish an AI management system.
